<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="viewport">
        <img
            class="brand-logo"
            src="{{ url_for('static', filename='img/logo.svg') }}"
            alt="Princesa Feona logo"
        >

        <header class="topbar">
            <nav class="menu" aria-label="Primary">
                <a href="#">ABOUT</a>
                <a href="#">SHOP</a>
                <a href="#">INSTAGRAM</a>
                <a href="#">CONTACT</a>
            </nav>
        </header>

        <main class="hero">
            <section class="video-frame" aria-label="Homepage video">
                <video autoplay muted loop playsinline>
                    <source src="{{ url_for('static', filename='video/home-video.mp4') }}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>

                <button class="sound-toggle" type="button">SOUND OFF</button>
            </section>
        </main>

        <footer class="site-footer">
            <p>COPYRIGHT &copy; 2026 PRINCESA FEONA. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>
</body>
</html>
